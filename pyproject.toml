[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "argus"
version = "1.0.0"
description = "Standalone search broker — routes queries across multiple web-search providers with fallback, RRF ranking, health tracking, and budget enforcement"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
keywords = ["mcp", "mcp-server", "search", "search-api", "search-broker", "ai-agents", "llm-tools", "web-search", "fastapi", "brave-search", "serper", "tavily", "exa", "searxng"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.5.0",
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.0",
    "httpx>=0.27.0",
    "click>=8.1.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]
mcp = [
    "mcp>=1.0.0",
]

[project.scripts]
argus = "argus.cli.main:cli"

[project.urls]
Homepage = "https://github.com/Khamel83/argus"
Repository = "https://github.com/Khamel83/argus"
Documentation = "https://github.com/Khamel83/argus#readme"
Issues = "https://github.com/Khamel83/argus/issues"

[tool.setuptools.packages.find]
include = ["argus*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
