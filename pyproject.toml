[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "argus"
version = "1.0.0"
description = "Standalone search broker — routes queries across multiple web-search providers"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.5.0",
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.0",
    "httpx>=0.27.0",
    "click>=8.1.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]
mcp = [
    "mcp>=1.0.0",
]

[project.scripts]
argus = "argus.cli.main:cli"

[tool.setuptools.packages.find]
include = ["argus*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
