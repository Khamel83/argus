services:
  argus:
    build:
      context: .
      args:
        # Production builds must set ARGUS_IMAGE_VCS_REF to the deployed commit
        # and ARGUS_IMAGE_ADMISSION_POLICY=production. Defaults are development-only.
        VCS_REF: "${ARGUS_IMAGE_VCS_REF:-local-compose-build}"
        IMAGE_ADMISSION_POLICY: "${ARGUS_IMAGE_ADMISSION_POLICY:-development}"
    image: argus:latest
    # Without the proxy profile: bind to ARGUS_BIND_HOST so you can reach it directly.
    # With the proxy profile: Caddy handles external traffic; argus stays on loopback.
    ports:
      - "${ARGUS_BIND_HOST:-127.0.0.1}:${ARGUS_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - ARGUS_HOST=0.0.0.0
      - ARGUS_PORT=8000
      - ARGUS_DATA_ROOT=/var/lib/argus
      - ARGUS_DB_URL=${ARGUS_DB_URL:-sqlite:////var/lib/argus/argus.db}
      - ARGUS_BUDGET_DB_PATH=/var/lib/argus/argus_budgets.db
      - ARGUS_NODE_ROLE=${ARGUS_NODE_ROLE:-primary}
      - ARGUS_EGRESS_TYPE=${ARGUS_EGRESS_TYPE:-unknown}
      - ARGUS_MACHINE_NAME=${ARGUS_MACHINE_NAME:-}
      - ARGUS_RESIDENTIAL_POLICY=${ARGUS_RESIDENTIAL_POLICY:-fallback}
    volumes:
      - argus-data:/var/lib/argus
    init: true
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 256
    shm_size: 256m
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    security_opt:
      - no-new-privileges:true
      - seccomp=./docker/playwright-seccomp.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - ARGUS_DOMAIN=${ARGUS_DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-}
    depends_on:
      argus:
        condition: service_healthy
    restart: unless-stopped

volumes:
  argus-data:
  caddy-data:
  caddy-config:
