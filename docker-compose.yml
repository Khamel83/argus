services:
  argus:
    build: .
    image: argus:latest
    ports:
      - "${ARGUS_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - ARGUS_HOST=0.0.0.0
      - ARGUS_PORT=8000
      - ARGUS_BUDGET_DB_PATH=/app/argus_budgets.db
    volumes:
      - argus-data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  argus-data:
